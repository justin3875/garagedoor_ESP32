<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>紅透天鐵門</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
* { -webkit-user-select: none; -webkit-touch-callout: none; user-select: none; }
:root { --bg: #020617; --card: #111827; --open: #22c55e; --close: #ef4444; --text: #e5e7eb; --muted: #94a3b8;}
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: linear-gradient(180deg, #020617, #0f172a); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center;}
.panel { width: 92%; max-width: 420px; background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,.45);}
h1 { text-align: center; margin: 0 0 10px; font-size: 22px;}
.status { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 16px; min-height: 20px; }
.card { background: #020617; border: 1px solid #1f2937; border-radius: 16px; padding: 16px; margin-bottom: 20px;}
.card-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; letter-spacing: 1px;}
#loginBox input { width: 90%; height: 46px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #1f2937; background: #020617; color: var(--text); padding: 0 14px; font-size: 15px; }
#loginBox button { width: 100%; height: 46px; border-radius: 12px; border: none; background: linear-gradient(180deg, #38bdf8, #0ea5e9); color: #020617; font-weight: 700; font-size: 15px; }
#controlBox { display: none;}
.btn { width: 100%; height: 110px; font-size: 28px; border: none; border-radius: 18px; color: #fff; font-weight: 700; margin-bottom: 18px; transition: transform .08s ease, opacity .08s ease; }
.btn:active { transform: scale(0.97); opacity: 0.85;}
.open  { background: var(--open); }
.close { background: var(--close); }
.hint { text-align: center; font-size: 13px; color: var(--muted); margin-top: 6px; cursor: pointer;}
.loading-mask { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.88); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 9999; }
.spinner { width: 56px; height: 56px; border: 4px solid #1f2937; border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>
<div class="panel">
  <h1>紅透天鐵捲門</h1>
  <div id="status" class="status">初始化中…</div>

  <div id="loginBox" class="card">
    <div class="card-title">MQTT 登入</div>
    <input id="userInput" placeholder="MQTT 帳號" autocapitalize="none" autocorrect="off" spellcheck="false">
    <input id="passInput" type="password" placeholder="MQTT 密碼">
    <button id="saveBtn">儲存並連線</button>
  </div>

  <div id="controlBox">
    <button class="btn open" id="openBtn">長按開門</button>
    <button class="btn close" id="closeBtn">長按關門</button>
  </div>

  <div class="hint" onclick="logout()">清除帳密</div>
  <div class="hint">長按 0.6 秒</div>
</div>

<div id="loadingMask" class="loading-mask">
  <div class="spinner"></div>
</div>

<script>
const MQTT_URL = "Your MQTT_URL";
const TOPIC = "Your MQTT_TOPIC";
const LONG_PRESS_MS = 600;

const statusEl = document.getElementById("status");
const loginBox = document.getElementById("loginBox");
const controlBox = document.getElementById("controlBox");
const openBtn = document.getElementById("openBtn");
const closeBtn = document.getElementById("closeBtn");
const loadingMask = document.getElementById("loadingMask");
const userInput = document.getElementById("userInput");
const passInput = document.getElementById("passInput");

let client = null;
let audioCtx = null;

/* ===== 跨平台震動回饋 ===== */
function triggerHaptic() {

  // Android 震動
  if (navigator.vibrate) {
    navigator.vibrate([40, 30, 40]); // 雙震
  }

  // iOS fallback
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    oscillator.type = "square";
    oscillator.frequency.value = 200;

    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);

    oscillator.connect(gain);
    gain.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.05);

  } catch (e) {}
}

/* 帳號小寫 */
userInput.addEventListener("input", () => {
  const s = userInput.selectionStart;
  const e = userInput.selectionEnd;
  userInput.value = userInput.value.toLowerCase();
  userInput.setSelectionRange(s, e);
});

function showLoading() { loadingMask.style.display = "flex"; }
function hideLoading() { loadingMask.style.display = "none"; }

/* MQTT 連線 */
function connectMQTT(user, pass) {
  client = mqtt.connect(MQTT_URL, {
    username: user,
    password: pass,
    reconnectPeriod: 3000,
    connectTimeout: 4000,
    keepalive: 30
  });

  client.on("connect", () => {
    hideLoading();
    statusEl.textContent = "已連線";
    statusEl.style.color = "#22c55e";
    loginBox.style.display = "none";
    controlBox.style.display = "block";
  });

  client.on("error", handleDisconnect);
  client.on("close", handleDisconnect);
}

function handleDisconnect() {
  hideLoading();
  controlBox.style.display = "none";
  statusEl.textContent = "連線中斷，重新連線中...";
  statusEl.style.color = "#facc15";
}

/* 儲存帳密 */
document.getElementById("saveBtn").onclick = () => {
  const u = userInput.value.trim().toLowerCase();
  const p = passInput.value.trim();
  if (!u || !p) return alert("請輸入帳號與密碼");

  localStorage.setItem("mqtt_user", u);
  localStorage.setItem("mqtt_pass", p);
  showLoading();
  connectMQTT(u, p);
};

function logout() {
  localStorage.clear();
  if (client) client.end(true);
  location.reload();
}

/* 長按送出 */
function bindLongPress(el, cmd) {
  let t = null;

  el.addEventListener("touchstart", () => {
    if (!client || !client.connected) return;

    t = setTimeout(() => {

      triggerHaptic(); 

      client.publish(TOPIC, cmd, { qos: 1 });

      statusEl.textContent = `✔ 已發送：${cmd}`;
      statusEl.style.color = "#22c55e";

    }, LONG_PRESS_MS);
  });

  ["touchend","touchcancel"].forEach(e =>
    el.addEventListener(e, () => clearTimeout(t))
  );
}

bindLongPress(openBtn, "OPEN");
bindLongPress(closeBtn, "CLOSE");

/* 自動登入 */
const su = localStorage.getItem("mqtt_user");
const sp = localStorage.getItem("mqtt_pass");

if (su && sp) {
  showLoading();
  connectMQTT(su, sp);
} else {
  statusEl.textContent = "請登入後操作";
}
</script>
</body>
</html>
